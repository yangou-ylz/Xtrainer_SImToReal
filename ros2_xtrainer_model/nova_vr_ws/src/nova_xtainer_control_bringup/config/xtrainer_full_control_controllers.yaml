controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    xtrainer_full_joint_controller:
      type: joint_trajectory_controller/JointTrajectoryController

xtrainer_full_joint_controller:
  ros__parameters:
    joints:
      - J1_1
      - J1_2
      - J1_3
      - J1_4
      - J1_5
      - J1_6
      - J1_7
      - J1_8
      - J2_1
      - J2_2
      - J2_3
      - J2_4
      - J2_5
      - J2_6
      - J2_7
      - J2_8
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: false

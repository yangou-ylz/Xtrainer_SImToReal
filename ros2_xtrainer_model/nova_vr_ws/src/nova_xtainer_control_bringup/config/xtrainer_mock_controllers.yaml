controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    xtrainer_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    xtrainer_gripper_controller:
      type: position_controllers/JointGroupPositionController

xtrainer_arm_controller:
  ros__parameters:
    joints:
      - left_joint1
      - left_joint2
      - left_joint3
      - left_joint4
      - left_joint5
      - left_joint6
      - right_joint1
      - right_joint2
      - right_joint3
      - right_joint4
      - right_joint5
      - right_joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: false

xtrainer_gripper_controller:
  ros__parameters:
    joints:
      - left_gripper_joint
      - right_gripper_joint
    interface_name: position
